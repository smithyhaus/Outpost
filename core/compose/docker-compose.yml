name: infra

# =============================================================================
# Layer 1: stateful data services + public ingress
# -----------------------------------------------------------------------------
# - cloudflared: single Cloudflare Tunnel egress; routes to caddy / data svcs / k3s
# - caddy: internal HTTP reverse proxy (TLS terminated at CF edge)
# - postgres / redis / rabbitmq / manticore: data services
# -----------------------------------------------------------------------------
# Port exposure policy:
#   * Data services bind 0.0.0.0:<port> so k3s pods can reach via host.docker.internal
#   * Other HTTP services are reachable only within the docker network
# =============================================================================

networks:
  infra:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  manticore_data:
  caddy_data:
  caddy_config:

services:
  # =========================================================================
  # Cloudflare Tunnel
  # Public Hostname routing is configured via the Cloudflare Dashboard.
  # See i18n/en/docs/01-cloudflare-setup.md for the full mapping.
  # =========================================================================
  cloudflared:
    # Profile-gated: only starts in `full` mode (when bootstrap passes
    # --profile tunnel). In `local` mode the data services are reached
    # directly on localhost and no tunnel egress is needed.
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # CF_TUNNEL_PROTOCOL: default `auto` (QUIC, http2 fallback). On restricted
    # networks that block QUIC's UDP/7844, set CF_TUNNEL_PROTOCOL=http2 in .env
    # so the connector registers over TCP. (Note: http2 cannot serve `cloudflared
    # access` TCP routes — expose TCP services via an HTTP reverse proxy instead.)
    command: tunnel --no-autoupdate --metrics 127.0.0.1:2000 run --protocol ${CF_TUNNEL_PROTOCOL:-auto} --token ${CF_TUNNEL_TOKEN}
    networks:
      - infra
    # cloudflared needs to reach host:30080 (k3s Traefik NodePort).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - caddy
    # The tunnel is the ONLY public path in. `restart: unless-stopped` only
    # fires on process crash — a silently-wedged connector (up but not
    # forwarding) previously had NO signal at all. `tunnel ready` queries the
    # metrics endpoint enabled above and exits non-zero until at least one
    # edge connection is up; verify.sh's compose section surfaces the status.
    # (Plain compose does not auto-restart on unhealthy — this is detection,
    # not self-heal.)
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 256m

  # =========================================================================
  # Caddy internal reverse proxy (HTTP only; TLS terminated at CF edge)
  # =========================================================================
  caddy:
    profiles: ["tunnel"]
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    # Lets caddy reach host-bound services (e.g. the k3s API on :6443) for
    # reverse-proxy fragments in Caddyfile.d/. Mirrors cloudflared's mapping.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ROOT_DOMAIN is required (host matchers depend on it).
      # The remaining vars are optional — Caddyfile uses {$VAR:default}
      # syntax, so leaving them unset falls back to the documented defaults.
      # Passing them through here makes them substitutable by Caddy at startup.
      ROOT_DOMAIN: ${ROOT_DOMAIN}
      SEARCH_HOST: ${SEARCH_HOST:-search}
      SEARCH_UPSTREAM: ${SEARCH_UPSTREAM:-manticore:9308}
      MQ_HOST: ${MQ_HOST:-mq}
      MQ_UPSTREAM: ${MQ_UPSTREAM:-rabbitmq:15672}
    networks:
      - infra
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./Caddyfile.d:/etc/caddy/Caddyfile.d:ro
      - caddy_data:/data
      - caddy_config:/config
    # Second hop of the public path (cloudflared → caddy). Admin API on
    # localhost:2019 is on by default; busybox wget ships in caddy:2-alpine.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 256m

  # =========================================================================
  # PostgreSQL 16 + pgvector
  # Bound to 0.0.0.0:5432 so both k3s pods (via host.docker.internal)
  # and the public internet (via Cloudflare Tunnel) can reach it.
  # =========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - infra
    ports:
      - "0.0.0.0:5432:5432"
    # Memory caps on all data services: they share ONE WSL2 VM memory pool
    # with the whole k3s cluster, but live outside kubectl's accounting —
    # unbounded, they can starve the pods (and vice versa) invisibly.
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Redis 7 (AOF + RDB persistence, password required)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - infra
    ports:
      - "0.0.0.0:6379:6379"
    # maxmemory 4g (above) + AOF/fork overhead headroom.
    mem_limit: 5g
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # RabbitMQ 3.13 + management plugin
  # AMQP on 5672 / Management UI on 15672
  # =========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - infra
    ports:
      - "0.0.0.0:5672:5672"
      - "0.0.0.0:15672:15672"
    mem_limit: 1536m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =========================================================================
  # Manticore Search 7.4.6 — standalone mode (replication hook reserved)
  # - 9308 : HTTP / JSON API   (replaces Meilisearch's 7700)
  # - 9306 : MySQL wire protocol (for apps that prefer SQL)
  # - 9312 : binary protocol + reserved port for future replication
  # The conf.d mount is inert in standalone (default config does not
  # `include` it). To enable replication, see core/compose/manticore/README.md.
  # =========================================================================
  manticore:
    image: manticoresearch/manticore:7.4.6
    container_name: manticore
    restart: unless-stopped
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - manticore_data:/var/lib/manticore
      # NOT :ro — the Manticore entrypoint chowns this dir at start; a
      # read-only bind mount makes chown fail and the container loops.
      - ./manticore/conf.d:/etc/manticoresearch/conf.d
    networks:
      - infra
    ports:
      - "0.0.0.0:9308:9308"
      - "0.0.0.0:9306:9306"
      - "0.0.0.0:9312:9312"
    mem_limit: 2g
    # Manticore image ships wget + mysql but NOT curl. 127.0.0.1 (not
    # localhost) for the same IPv6-first-resolution reason called out
    # in the old Meilisearch healthcheck.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9308/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
