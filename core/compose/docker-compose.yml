name: infra

# =============================================================================
# Layer 1: stateful data services + public ingress
# -----------------------------------------------------------------------------
# - cloudflared: single Cloudflare Tunnel egress; routes to caddy / data svcs / k3s
# - caddy: internal HTTP reverse proxy (TLS terminated at CF edge)
# - postgres / redis / rabbitmq / meilisearch: data services
# -----------------------------------------------------------------------------
# Port exposure policy:
#   * Data services bind 0.0.0.0:<port> so k3s pods can reach via host.docker.internal
#   * Other HTTP services are reachable only within the docker network
# =============================================================================

networks:
  infra:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  meili_data:
  caddy_data:
  caddy_config:

services:
  # =========================================================================
  # Cloudflare Tunnel
  # Public Hostname routing is configured via the Cloudflare Dashboard.
  # See i18n/en/docs/01-cloudflare-setup.md for the full mapping.
  # =========================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    networks:
      - infra
    # cloudflared needs to reach host:30080 (k3s Traefik NodePort).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - caddy

  # =========================================================================
  # Caddy internal reverse proxy (HTTP only; TLS terminated at CF edge)
  # =========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    environment:
      # Required by Caddyfile {$ROOT_DOMAIN} substitution. Without this the
      # host matchers expand to empty strings and all routes 404.
      ROOT_DOMAIN: ${ROOT_DOMAIN}
    networks:
      - infra
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # =========================================================================
  # PostgreSQL 16 + pgvector
  # Bound to 0.0.0.0:5432 so both k3s pods (via host.docker.internal)
  # and the public internet (via Cloudflare Tunnel) can reach it.
  # =========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - infra
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Redis 7 (AOF + RDB persistence, password required)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - infra
    ports:
      - "0.0.0.0:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # RabbitMQ 3.13 + management plugin
  # AMQP on 5672 / Management UI on 15672
  # =========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - infra
    ports:
      - "0.0.0.0:5672:5672"
      - "0.0.0.0:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =========================================================================
  # Meilisearch v1.10 (production mode requires master key)
  # =========================================================================
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    networks:
      - infra
    ports:
      - "0.0.0.0:7700:7700"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 5
