apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: tekton-pipelines
  labels:
    # Tekton Dashboard + EventListener pods fail under the K8s default
    # `restricted` Pod Security level (they need things like
    # allowPrivilegeEscalation / runAsNonRoot=false defaults). Downgrade
    # to `baseline`. Apps namespace stays at the cluster default.
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: v1
kind: Namespace
metadata:
  name: infra-bridges
---
apiVersion: v1
kind: Namespace
metadata:
  name: apps
---
# Testkube — K8s-native test orchestrator (test-runner plugin).
# `baseline` PSA so TestWorkflow runner pods can mount workspaces.
apiVersion: v1
kind: Namespace
metadata:
  name: testkube
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
# Argo Rollouts — progressive delivery + auto-rollback (rollout plugin).
apiVersion: v1
kind: Namespace
metadata:
  name: argo-rollouts
  labels:
    pod-security.kubernetes.io/enforce: baseline
