apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: tekton-pipelines
  labels:
    # Tekton Dashboard + EventListener pods fail under the K8s default
    # `restricted` Pod Security level (they need things like
    # allowPrivilegeEscalation / runAsNonRoot=false defaults). Downgrade
    # to `baseline`. Apps namespace stays at the cluster default.
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets
---
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: v1
kind: Namespace
metadata:
  name: infra-bridges
---
apiVersion: v1
kind: Namespace
metadata:
  name: apps
---
# Testkube — K8s-native test orchestrator (test-runner plugin).
# `baseline` PSA so TestWorkflow runner pods can mount workspaces.
apiVersion: v1
kind: Namespace
metadata:
  name: testkube
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
# Argo Rollouts — progressive delivery + auto-rollback (rollout plugin).
apiVersion: v1
kind: Namespace
metadata:
  name: argo-rollouts
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
# buildkit — the persistent build daemon (core/k8s/08-buildkit). buildkitd runs
# `privileged: true` (mount/overlayfs/runc), which `baseline`/`restricted` PSA
# forbid; this namespace is the ONLY one labeled `enforce=privileged`. The
# buildctl CLIENT stays in tekton-pipelines (baseline) — only the daemon needs
# the elevated level, and isolating it here keeps the blast radius to one ns.
apiVersion: v1
kind: Namespace
metadata:
  name: buildkit
  labels:
    pod-security.kubernetes.io/enforce: privileged
