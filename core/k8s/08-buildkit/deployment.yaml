# =============================================================================
# buildkitd — one long-lived rootful (privileged) build daemon.
# -----------------------------------------------------------------------------
# WHY privileged + own namespace: buildkitd needs privileged (mount/overlayfs/
# runc). tekton-pipelines is `enforce=baseline` (00-namespaces.yaml) which
# FORBIDS privileged:true — a probe confirmed a privileged pod is admitted only
# in a `enforce=privileged`-labeled namespace, so this lives in ns `buildkit`.
# kaniko survives baseline only because it needs runAsUser:0, not privileged.
#
# WHY --oci-worker-net=host: build RUN steps must reach the in-cluster Verdaccio
# (@hy/* packages) and the self-hosted registry, both ClusterIP Services. With
# host net the RUN sandbox shares THIS pod's netns (not the physical node — the
# pod is not hostNetwork), so kube-proxy routes RUN traffic to ClusterIPs.
# Probe result: VERDACCIO in-cluster reachable from a RUN in 0.086s.
#
# strategy: Recreate — the cache PVC is RWO on a single node; a rolling update
# would deadlock the second pod on the volume. SPOF is accepted for a
# single-tenant homelab (a daemon OOM aborts in-flight builds); memory is sized
# generously and max-parallelism (buildkitd.toml) bounds concurrent step RAM.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: buildkit
  labels:
    app: buildkitd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      containers:
        - name: buildkitd
          # Pinned via the DaoCloud docker.io mirror (node containerd has no CN
          # egress to docker.io) — same mirror-prefix pattern as the kaniko task.
          image: m.daocloud.io/docker.io/moby/buildkit:v0.16.0
          # Startup wrapper: self-heal + sysctl, then exec buildkitd.
          #
          # 1) STALE LOCK: an OOM-SIGKILL mid-build leaves /var/lib/buildkit/
          #    buildkitd.lock behind, and every replacement pod then CrashLoops
          #    on "could not lock buildkitd.lock, another instance running?"
          #    (took CI down twice, 2026-07-12/13, needed manual scale-0 + rm).
          #    With strategy=Recreate, replicas=1 and a single-node RWO PVC, no
          #    other buildkitd can be alive when this container starts — any
          #    lock present at boot is BY DEFINITION stale. Remove it.
          #
          # 2) DIRTY-CACHE HANG: recovering a dirty store after a SIGKILL was
          #    observed to freeze forever at "auto snapshotter: using overlayfs"
          #    (>7min, zero log progress; healthy start is ~12s). The wrapper
          #    counts boot attempts in .boot-attempts on the PVC; a background
          #    probe clears it once the daemon answers `buildctl debug workers`.
          #    If two consecutive boots never got healthy, the 3rd boot wipes
          #    the cache and starts clean. Cost: cold builds (~4.5min each with
          #    npmmirror) until the store re-warms — far cheaper than CI being
          #    down until a human runs the scale-0/wipe runbook.
          #
          # 3) INOTIFY: `nest build` watches source dirs (e.g. /app/proto); the
          #    RUN sandbox inherits the host default of 128 inotify instances
          #    (counted PER-UID across concurrent builds) — proto-heavy repos
          #    hit `EMFILE: too many open files, watch '/app/proto'`. 8192 gives
          #    headroom; the pod is privileged so sysctl -w reaches sandboxes.
          command:
            - /bin/sh
            - -c
            - |
              rm -f /var/lib/buildkit/buildkitd.lock
              BOOT=/var/lib/buildkit/.boot-attempts
              n=$(cat "$BOOT" 2>/dev/null || echo 0)
              if [ "$n" -ge 2 ]; then
                echo "[self-heal] $n consecutive failed boots — wiping dirty cache for a clean start"
                find /var/lib/buildkit -mindepth 1 -maxdepth 1 ! -name 'lost+found' -exec rm -rf {} +
                n=0
              fi
              echo $((n+1)) > "$BOOT"
              # 40×10s ≈ 400s — just past the startupProbe window (36×10s);
              # any boot still unhealthy by then gets killed by the probe
              # anyway, so a longer loop is dead config. Keep the two in
              # lockstep if you retune the probe.
              (
                i=0
                while [ "$i" -lt 40 ]; do
                  sleep 10; i=$((i+1))
                  if buildctl --addr tcp://127.0.0.1:1234 debug workers >/dev/null 2>&1; then
                    rm -f "$BOOT"; exit 0
                  fi
                done
              ) &
              sysctl -w fs.inotify.max_user_instances=8192 2>/dev/null || true
              exec buildkitd --addr tcp://0.0.0.0:1234 --oci-worker-net=host --config=/etc/buildkit/buildkitd.toml
          securityContext:
            privileged: true
          ports:
            - name: grpc
              containerPort: 1234
          # Startup can be slow when buildkit recovers a large/dirty cache after
          # an unclean shutdown (healthy start is ~12s; give recovery 6min before
          # liveness arms). Both observed dirty recoveries HUNG forever rather
          # than finishing slowly, so a longer window only delays the wrapper's
          # boot-attempt self-heal (see command above): boot 1-2 each get 6min,
          # boot 3 wipes the cache and starts clean in seconds — fully automatic.
          # timeoutSeconds on all three: the default 1s is too tight for an
          # exec probe that forks buildctl + does a gRPC round-trip while the
          # daemon runs 4 parallel builds — a slow-but-alive daemon would get
          # liveness-killed mid-build AND falsely bump .boot-attempts toward
          # a cache wipe.
          startupProbe:
            exec:
              command:
                - buildctl
                - --addr
                - tcp://127.0.0.1:1234
                - debug
                - workers
            periodSeconds: 10
            failureThreshold: 36
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - buildctl
                - --addr
                - tcp://127.0.0.1:1234
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - buildctl
                - --addr
                - tcp://127.0.0.1:1234
                - debug
                - workers
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              # Node has 24 CPU / 53GB. Sized for max-parallelism=6
              # (buildkitd.toml): ~6 concurrent tsc/pnpm build steps can each
              # spike a few GB, so 12Gi OOM-killed the daemon under a fleet
              # re-push (the SIGKILL then left a stale buildkitd.lock that
              # CrashLooped every replacement pod). 24Gi leaves ample headroom
              # for the app workloads on a 53GB node; raise in lockstep with
              # max-parallelism, never one without the other.
              cpu: "16"
              memory: 24Gi
          volumeMounts:
            - name: cache
              mountPath: /var/lib/buildkit
            - name: config
              mountPath: /etc/buildkit
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkitd-cache
        - name: config
          configMap:
            name: buildkitd-toml
