# =============================================================================
# buildkitd.toml — daemon config for the persistent buildkit build engine.
# -----------------------------------------------------------------------------
# Consumed by the buildkitd Deployment via --config=/etc/buildkit/buildkitd.toml.
# Everything the kaniko path did per-build via KANIKO_EXTRA_ARGS is a DAEMON
# concern in buildkit and lives here instead:
#   - registry mirror (CN can't reach docker.io) → [registry."docker.io"] mirrors
#   - insecure HTTP push to the self-hosted registry → [registry."…:5000"]
#   - concurrency governor → worker.oci.max-parallelism (was 6-way kaniko contention)
#   - disk safety → gcpolicy sized UNDER the 50Gi PVC (default 70GB keep would
#     ENOSPC a 50Gi volume). reservedSpace/maxUsedSpace/minFreeSpace in GB.
# The buildkit Task's per-build args carry ONLY --build-arg (HY_REGISTRY); all of
# the above is fixed here so app builds never re-specify it.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-toml
  namespace: buildkit
data:
  buildkitd.toml: |
    root = "/var/lib/buildkit"

    [worker.oci]
      enabled = true
      # The real concurrency cap: at most N build steps run at once across ALL
      # in-flight PipelineRuns (one daemon, shared). Node has 24 CPU / 53GB; 6
      # lets a fleet re-push (18 repos) drain without serializing to a crawl,
      # while the daemon's cpu/mem limits (deployment.yaml, 16 CPU / 24Gi) keep
      # it from starving the app workloads. Raising this REQUIRES raising the
      # daemon mem limit in lockstep — an earlier 2-way run at a 12Gi limit
      # OOM-killed the daemon, and the SIGKILL left a stale buildkitd.lock that
      # CrashLooped every new pod ("could not lock … another instance running").
      max-parallelism = 6
      # GC DISABLED — the persistent pnpm store IS the whole point; automatic GC
      # must not reclaim it. A prior custom single gcpolicy (all=true,
      # reservedSpace=8GB) was measured evicting the idle store cache mount
      # within ~15min, making every build cold again (du=0 after a build). With
      # gc off it never evicts. Safe here: node has ~880GB free and buildkit's
      # cache is content-addressed/deduped (base images + npm tarballs shared
      # across all apps), so steady-state is a handful of GB. If it ever grows,
      # prune manually WITHOUT wiping the live store, e.g.:
      #   buildctl --addr tcp://127.0.0.1:1234 prune --keep-storage 100GB
      # (wire as a CronJob if unbounded growth ever becomes real).
      gc = false

    # containerd worker off — the OCI worker (native runc) is what runs here.
    [worker.containerd]
      enabled = false

    # docker.io is reset/unreachable from CN egress. Route base-image + frontend
    # (docker/dockerfile:1) pulls through the DaoCloud pull-through mirror; buildkit
    # falls back to index.docker.io on a mirror miss. Drop for non-CN clusters.
    [registry."docker.io"]
      mirrors = ["docker.m.daocloud.io"]

    # Self-hosted registry is plain HTTP + anonymous. The daemon (not the client)
    # does the push, so IT needs the insecure allowance — mirror of what kaniko's
    # --insecure/--skip-tls-verify did.
    [registry."docker-registry.registry.svc.cluster.local:5000"]
      http = true
      insecure = true
