# ============================================================================
# ArgoCD server 关闭自带 TLS（让 Traefik IngressRoute 用 HTTP 8080 接入）
# 否则 argocd-server 会用 self-signed 证书在 443 上服务，Traefik 反代会出问题
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  server.insecure: "true"
