# ============================================================================
# Gitee manifest 仓库凭据（HTTPS + Personal Access Token）
# bootstrap.sh 会把 ${GITEE_USER} / ${GITEE_TOKEN} / ${MANIFEST_REPO_URL}
# 替换为 .env 中的真实值
#
# 备注：Gitee 私有仓库 ArgoCD 推荐用 HTTPS + token，比 SSH 简单
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gitee-manifest-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: ${MANIFEST_REPO_URL}
  username: ${GITEE_USER}
  password: ${GITEE_TOKEN}
