# ============================================================================
# Manifest 仓库凭据（HTTPS + Personal Access Token）
# bootstrap.sh 会把 ${GIT_USER} / ${GIT_TOKEN} / ${MANIFEST_REPO_URL}
# 替换为 .env 中的真实值。
#
# 备注：
# - 私有仓库 ArgoCD 推荐用 HTTPS + token，比 SSH 简单
# - Secret 名是 provider-agnostic 的（git-manifest-repo），同时支持
#   Gitee / GitHub / GitLab。具体协议由 ${GIT_USER} / ${GIT_TOKEN} 与
#   ${MANIFEST_REPO_URL} 一起决定
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: git-manifest-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: ${MANIFEST_REPO_URL}
  username: ${GIT_USER}
  password: ${GIT_TOKEN}
