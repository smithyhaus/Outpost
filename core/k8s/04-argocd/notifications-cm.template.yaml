# =============================================================================
# argocd-notifications-cm — base template.
# -----------------------------------------------------------------------------
# bootstrap.d/09-test-gate.sh CONCATENATES per-plugin fragments into the
# `data:` section below. Each enabled notification plugin contributes:
#   - a `service.webhook.<provider>` definition
#   - one `template.app-<event>-<provider>` body template per event
#
# After concat, bootstrap.d/09-test-gate.sh substitutes the `_PLUGIN_*_`
# placeholders below with comma-joined per-plugin template names + service
# recipient names derived from NOTIFICATION_PROVIDERS. Without that
# substitution the cm is invalid YAML (literal placeholders inside lists).
#
# Triggers cover the full app lifecycle so operators see both green (deploy
# OK) and red (failure / regression) signals — answering "did my push land?"
# without watching the ArgoCD UI.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # --- Universal triggers (provider-agnostic) ---
  # on-deployed fires when the app successfully syncs AND becomes Healthy.
  # `oncePer: app.status.sync.revision` makes ArgoCD only notify once per
  # revision (otherwise the controller would re-fire on every reconciliation
  # while the condition holds).
  trigger.on-deployed: |
    - description: Application is synced and healthy
      oncePer: app.status.sync.revision
      send: [_PLUGIN_TEMPLATES_DEPLOYED_]
      when: |
        app.status.operationState != nil and
        app.status.operationState.phase in ['Succeeded'] and
        app.status.health.status == 'Healthy'
  trigger.on-sync-failed: |
    - description: Application sync has failed
      send: [_PLUGIN_TEMPLATES_SYNC_FAILED_]
      when: app.status.operationState.phase in ['Error', 'Failed']
  trigger.on-degraded: |
    - description: Application is degraded
      send: [_PLUGIN_TEMPLATES_DEGRADED_]
      when: app.status.health.status == 'Degraded'
  trigger.on-deleted: |
    - description: Application is being deleted
      oncePer: app.metadata.name
      send: [_PLUGIN_TEMPLATES_DELETED_]
      when: app.metadata.deletionTimestamp != nil
  trigger.on-rollback: |
    - description: Rollouts auto-rolled back
      send: [_PLUGIN_TEMPLATES_ROLLBACK_]
      when: |
        app.metadata.annotations != nil &&
        app.metadata.annotations['argocd-rollouts.outpost.io/last-state'] == 'Aborted'

  # --- Subscriptions: who listens to which trigger ---
  # Default: every Application subscribes to all webhook services that exist
  # for all five triggers. Per-app override via Application.metadata.annotations:
  #   notifications.argoproj.io/subscribe.on-sync-failed.webhook.dingtalk: ""
  subscriptions: |
    - recipients: [_PLUGIN_RECIPIENTS_]
      triggers: [on-deployed, on-sync-failed, on-degraded, on-deleted, on-rollback]
