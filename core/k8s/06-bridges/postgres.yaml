# ============================================================================
# K8s → Compose 数据服务桥接
# pod 内通过 postgres.infra-bridges.svc.cluster.local:5432 访问 Compose 的 PG
#
# 生产环境只需把 externalName 改为云服务 endpoint，应用 connection string 不变
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: infra-bridges
spec:
  type: ExternalName
  externalName: host.docker.internal
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
