# ============================================================================
# Tekton 用到的 Secret 模板（provider-agnostic）
# bootstrap.sh 渲染(替换占位符)后用 kubectl apply(首次 bootstrap)
# 后续 ArgoCD 同步用 SealedSecret 形式
#
# 占位符：
#   ${GIT_USER}     — Git 平台用户名（Gitee / GitHub / GitLab）
#   ${GIT_TOKEN}    — Personal Access Token
#   ${GIT_HOST}     — 由 bootstrap 从 MANIFEST_REPO_URL 自动派生
#                     （如 gitee.com / github.com / gitlab.com）
#   ${ROOT_DOMAIN}  — Outpost 自己的根域名
# ============================================================================

# ----- Git 凭据：basic-auth + git credential file -----
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: tekton-pipelines
  annotations:
    tekton.dev/git-0: https://${GIT_HOST}
type: Opaque
stringData:
  # tekton git-clone task 用 basic-auth 格式
  username: ${GIT_USER}
  password: ${GIT_TOKEN}
  # update-manifest task + git-clone(catalog v0.10+) 都要这两个文件:
  # .git-credentials 存凭据,.gitconfig 启用 credential.helper=store。
  # 缺 .gitconfig 时 git-clone step-clone 会以 cp:cannot stat 报 exit 1。
  .git-credentials: |
    https://${GIT_USER}:${GIT_TOKEN}@${GIT_HOST}
  .gitconfig: |
    [credential]
        helper = store
    [user]
        email = tekton-ci@local
        name = Tekton CI
---
# ----- Docker Registry 凭据（推送 image 用，匿名 + 内部 registry 不需要鉴权）
# Kaniko 仍需要 docker config json，给个空配置即可（registry 内部明文无认证）
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: tekton-pipelines
type: Opaque
stringData:
  config.json: |
    {
      "auths": {
        "registry.${ROOT_DOMAIN}": {}
      }
    }
