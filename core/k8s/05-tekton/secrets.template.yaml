# ============================================================================
# Tekton 用到的 Secret 模板
# bootstrap.sh 渲染（替换 ${XXX}）后用 sealed-secrets 加密，写入 manifest 仓库
# 这里直接生成明文 Secret 走 kubectl apply（首次 bootstrap），后续 ArgoCD 同步
# 用 SealedSecret 形式
# ============================================================================

# ----- Gitee 凭据：basic-auth + git credential file -----
apiVersion: v1
kind: Secret
metadata:
  name: gitee-credentials
  namespace: tekton-pipelines
  annotations:
    tekton.dev/git-0: https://gitee.com
type: Opaque
stringData:
  # tekton git-clone task 用 basic-auth 格式
  username: ${GITEE_USER}
  password: ${GITEE_TOKEN}
  # update-manifest task 用 .git-credentials 文件
  .git-credentials: |
    https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com
---
# ----- Docker Registry 凭据（推送 image 用，匿名 + 内部 registry 不需要鉴权）
# Kaniko 仍需要 docker config json，给个空配置即可（registry 内部明文无认证）
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: tekton-pipelines
type: Opaque
stringData:
  config.json: |
    {
      "auths": {
        "registry.${ROOT_DOMAIN}": {}
      }
    }
