# ============================================================================
# 通用构建 + GitOps 部署 Pipeline
# 步骤（fail-fast：测试在昂贵的镜像构建之前）：
#   1. fetch-source      用 git clone 拉取应用代码
#   2. read-build-config 读 outpost.build.yaml(无则用平台默认 kaniko 参数)
#   3. run-tests         Gate A — 跑 outpost.test.yaml / Dockerfile.test;
#                        没有这两个文件则 skipped(不算失败)。测试只读 source,
#                        不依赖镜像 → 放在构建之前;失败即止,省下一整轮
#                        kaniko 构建(Java/.NET 多阶段最长 90min)。
#   4. build-and-push    Gate A 通过后,用 Kaniko 构建镜像并推到 registry
#   5. update-manifest   克隆 manifest 仓库，用 yq 改 image tag，commit + push
#
# finally:
#   notify-on-failure   PipelineRun 失败时,fan-out 到所有启用的通知 plugin
#                        (dingtalk / feishu / wecom / webhook-generic)。
#                        provider 列表在 bootstrap 渲染时从 NOTIFICATION_PROVIDERS
#                        envsubst 进来。
#
# 应用代码仓库约定：根目录有 Dockerfile,可选 outpost.test.yaml / Dockerfile.test
# manifest 仓库约定：apps/<repo-name>/deployment.yaml 存在 image 字段
# ============================================================================
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-and-deploy
  namespace: tekton-pipelines
spec:
  # NOTE on timeouts: Pipeline v1beta1 does NOT carry spec.timeouts —
  # that field only lives on v1 Pipeline and on PipelineRun (both APIs).
  # Per-task timeouts are set inside spec.tasks[].timeout below.
  # The PipelineRun-level overall timeout is set in triggertemplate.yaml,
  # which is what gets created on every webhook hit. Constraint enforced
  # at run creation: tasks + finally <= pipeline.
  params:
    - name: repo-url
      type: string
      description: 应用代码仓库 HTTPS URL
    - name: repo-name
      type: string
      description: 仓库名（用作 manifest 子目录与 image 名）
    - name: branch
      type: string
      default: main
    - name: revision
      type: string
      description: commit SHA
    - name: image-tag
      type: string
      description: 镜像 tag（短 SHA）
    - name: pusher
      type: string
      default: ""
      description: |
        Who pushed (gitee body.user_name / github body.pusher.name /
        gitlab body.user_username). Surfaced in notifications so the dev who
        pushed gets routed/mentioned correctly. Empty if the git-provider
        plugin doesn't expose it.
    - name: registry
      type: string
      description: |
        镜像写进 manifest 用的 host(K8s containerd 据此拉取)。
        Default 由 bootstrap.sh 根据 REGISTRY_PLUGIN envsubst 注入:
          self-hosted → registry.<root>
          aliyun-acr  → <ACR registry>/<ACR namespace>
      default: ${REGISTRY_HOST}
    - name: registry-push
      type: string
      description: |
        kaniko push 用的 host(可与 registry 不同)。
          self-hosted: docker-registry.registry.svc.cluster.local:5000
            (走 in-cluster Service,绕开 cloudflared 的 HTTP/2 大 blob 边界)
          aliyun-acr: 与 registry 同 host(ACR 公网走 HTTPS)
        Default 由 bootstrap.sh 根据 REGISTRY_PLUGIN envsubst 注入。
      default: ${REGISTRY_PUSH_HOST}
    - name: manifest-repo-url
      type: string
      default: ${MANIFEST_REPO_URL}
    - name: manifest-branch
      type: string
      default: ${MANIFEST_REPO_BRANCH}

  workspaces:
    - name: shared-workspace
    - name: dockerconfig
    - name: git-creds

  tasks:
    # -------------------------------------------------------------------------
    # 0. notify-on-start — fan-out a "build started" event with a deep
    #    link to this PipelineRun. No runAfter — runs in parallel with
    #    fetch-source so notify hiccups never delay the actual build.
    # -------------------------------------------------------------------------
    - name: notify-on-start
      taskRef:
        name: outpost-notify
        kind: Task
      params:
        - name: payload
          value: |
            {"event":"tekton.pipelinerun.started","level":"info","app":"$(params.repo-name)","env":"dev","commit":"$(params.image-tag)","ref":"$(params.branch)","url":"https://tekton.${ROOT_DOMAIN}/#/namespaces/tekton-pipelines/pipelineruns/$(context.pipelineRun.name)","text":"Build started for $(params.repo-name)@$(params.image-tag)","pusher":"$(params.pusher)"}
        - name: providers
          value: "${NOTIFICATION_PROVIDERS}"

    # -------------------------------------------------------------------------
    # 1. 拉应用代码
    # -------------------------------------------------------------------------
    - name: fetch-source
      # Per-task budget. Pulling source over HTTPS clone is normally
      # under a minute; allow 10m for large repos / slow networks.
      timeout: "10m"
      # CN egress to github.com is intermittent: a clone can hit a ~130s connect
      # timeout even when github is reachable seconds later. A single transient
      # failure must NOT fail the whole build — Tekton re-runs the TaskRun in a
      # fresh pod, riding out the flap. Each attempt keeps the 10m per-run cap.
      retries: 3
      taskRef:
        name: git-clone
        kind: Task
      workspaces:
        - name: output
          workspace: shared-workspace
        - name: basic-auth
          workspace: git-creds
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: subdirectory
          value: source
        - name: deleteExisting
          value: "true"

    # -------------------------------------------------------------------------
    # 2. Read per-app outpost.build.yaml (optional file in source root).
    # No file → v0.2 defaults (./Dockerfile + ./ context + platform args).
    # File present → app overrides dockerfile/context and appends buildArgs +
    # extraArgs to the platform defaults. Single source of truth:
    # scripts/read-build-config.sh (bats-tested).
    # -------------------------------------------------------------------------
    - name: read-build-config
      timeout: "2m"
      runAfter:
        - fetch-source
      taskRef:
        name: outpost-read-build-config
        kind: Task
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: source-subdir
          value: source
        # Platform-default kaniko args (registry-plugin-aware: --cache=true +
        # --cache-repo=... and --insecure/--skip-tls-verify for self-hosted).
        # The Task merges these with the app's buildArgs/extraArgs.
        - name: default-extra-args
          value: '${KANIKO_EXTRA_ARGS}'

    # -------------------------------------------------------------------------
    # 3. Gate A — run application tests BEFORE the expensive image build.
    # -------------------------------------------------------------------------
    # Fail-fast: run-tests reads ONLY the source workspace (it detects/executes
    # outpost.test.yaml / Dockerfile.test from the cloned source — it does not
    # need the built image). Gating here means a commit that fails its tests
    # never pays the kaniko build cost (up to 90min for Java/.NET multi-stage).
    # No-ops cleanly when neither test file exists (skipped, not failed). On a
    # real failure the Pipeline aborts here: build-and-push AND update-manifest
    # never run, the manifest repo is never touched, ArgoCD sees no change, the
    # cluster is unaffected.
    - name: run-tests
      timeout: "20m"
      runAfter:
        - read-build-config
      taskRef:
        name: outpost-run-tests
        kind: Task
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: app-name
          value: $(params.repo-name)
        - name: source-subdir
          value: source

    # -------------------------------------------------------------------------
    # 4. 构建并推到 registry（仅在 Gate A 通过后）
    # -------------------------------------------------------------------------
    - name: build-and-push
      # Multi-stage Dockerfiles (Java/Maven, .NET SDK) on slow networks
      # easily blow past 60min during base-image pulls. 90min cap.
      timeout: "90m"
      # Transient base-image / verdaccio / registry-push hiccups: one retry.
      retries: 1
      runAfter:
        - run-tests
      taskRef:
        # Build engine is operator-selectable: ${BUILD_ENGINE_TASK} (default
        # buildkit; kaniko is the one-word rollback) is envsubst'd at bootstrap
        # render time. Both the `kaniko` and `buildkit` Tasks are applied every
        # bootstrap and share the same IMAGE/DOCKERFILE/CONTEXT/EXTRA_ARGS
        # param contract, so flipping BUILD_ENGINE_TASK cuts over (or rolls
        # back) with no other change here.
        name: ${BUILD_ENGINE_TASK}
        kind: Task
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: source
        - name: dockerconfig
          workspace: dockerconfig
      params:
        - name: IMAGE
          value: $(params.registry-push)/$(params.repo-name):$(params.image-tag)
        # DOCKERFILE / CONTEXT / EXTRA_ARGS now come from outpost.build.yaml
        # via the read-build-config Task. Absent file → v0.2 defaults
        # (./Dockerfile + ./ + platform's KANIKO_EXTRA_ARGS only). Present file
        # → app's dockerfile/context/buildArgs/extraArgs override/append.
        - name: DOCKERFILE
          value: $(tasks.read-build-config.results.dockerfile)
        - name: CONTEXT
          value: $(tasks.read-build-config.results.context)
        - name: EXTRA_ARGS
          value:
            - $(tasks.read-build-config.results.extra-args[*])

    # -------------------------------------------------------------------------
    # 5. 拉 manifest 仓库，改 image tag，提交回去
    # -------------------------------------------------------------------------
    - name: update-manifest
      # yq edit + git commit + push — well under a minute normally.
      timeout: "5m"
      # Manifest-repo clone + yq download + push all hit github/mirrors over the
      # same flaky CN egress. Retry transient failures.
      retries: 2
      runAfter:
        - build-and-push
      taskRef:
        name: update-manifest-task
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: manifest
        - name: git-creds
          workspace: git-creds
      params:
        - name: manifest-repo-url
          value: $(params.manifest-repo-url)
        - name: manifest-branch
          value: $(params.manifest-branch)
        - name: app-name
          value: $(params.repo-name)
        - name: image
          value: $(params.registry)/$(params.repo-name):$(params.image-tag)
        - name: commit-message
          value: "chore($(params.repo-name)): bump image to $(params.image-tag)"

  # ---------------------------------------------------------------------------
  # finally — runs unconditionally after all tasks complete (success or fail).
  # The notify-on-failure task uses a `when:` clause to fire ONLY when the
  # PipelineRun overall status is Failed (i.e. any task above failed).
  # ---------------------------------------------------------------------------
  finally:
    - name: notify-on-failure
      when:
        - input: "$(tasks.status)"
          operator: in
          values: ["Failed"]
      taskRef:
        name: outpost-notify
        kind: Task
      params:
        - name: payload
          value: |
            {"event":"tekton.pipelinerun.failed","level":"error","app":"$(params.repo-name)","env":"dev","commit":"$(params.image-tag)","ref":"$(params.branch)","url":"https://tekton.${ROOT_DOMAIN}/#/namespaces/tekton-pipelines/pipelineruns/$(context.pipelineRun.name)","text":"PipelineRun failed — open the link for the failed task's logs","pusher":"$(params.pusher)"}
        - name: providers
          value: "${NOTIFICATION_PROVIDERS}"
