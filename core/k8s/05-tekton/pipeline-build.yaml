# ============================================================================
# 通用构建 + GitOps 部署 Pipeline
# 步骤：
#   1. fetch-source     用 git clone 拉取应用代码
#   2. build-and-push   用 Kaniko 构建镜像并推到 registry
#   3. run-tests        Gate A — 跑 outpost.test.yaml / Dockerfile.test;
#                        没有这两个文件则 skipped(不算失败)
#   4. update-manifest  克隆 manifest 仓库，用 yq 改 image tag，commit + push
#
# finally:
#   notify-on-failure   PipelineRun 失败时,fan-out 到所有启用的通知 plugin
#                        (dingtalk / feishu / wecom / webhook-generic)。
#                        provider 列表在 bootstrap 渲染时从 NOTIFICATION_PROVIDERS
#                        envsubst 进来。
#
# 应用代码仓库约定：根目录有 Dockerfile,可选 outpost.test.yaml / Dockerfile.test
# manifest 仓库约定：apps/<repo-name>/deployment.yaml 存在 image 字段
# ============================================================================
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-and-deploy
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      type: string
      description: 应用代码仓库 HTTPS URL
    - name: repo-name
      type: string
      description: 仓库名（用作 manifest 子目录与 image 名）
    - name: branch
      type: string
      default: main
    - name: revision
      type: string
      description: commit SHA
    - name: image-tag
      type: string
      description: 镜像 tag（短 SHA）
    - name: registry
      type: string
      description: 公网/外部 host(写进 manifest,K8s containerd 用它拉)
      default: registry.${ROOT_DOMAIN}
    - name: registry-push
      type: string
      description: |
        kaniko push 用的 host。默认走 in-cluster Service(self-hosted 插件场景),
        绕开公网/cloudflared 的 HTTP/2 边界 — 大 blob upload 在 Cloudflare 边界
        容易触发 PROTOCOL_ERROR。registry 后端是同一个,push 与 pull 用不同 host
        没问题(registry 按 repo path 存,host 只是寻址)。
        aliyun-acr 等外部 registry 插件场景:让 plugin 覆盖此默认值为公网 host。
      default: docker-registry.registry.svc.cluster.local:5000
    - name: manifest-repo-url
      type: string
      default: ${MANIFEST_REPO_URL}
    - name: manifest-branch
      type: string
      default: ${MANIFEST_REPO_BRANCH}

  workspaces:
    - name: shared-workspace
    - name: dockerconfig
    - name: git-creds

  tasks:
    # -------------------------------------------------------------------------
    # 1. 拉应用代码
    # -------------------------------------------------------------------------
    - name: fetch-source
      # Per-task budget. Pulling source over HTTPS clone is normally
      # under a minute; allow 10m for large repos / slow networks.
      timeout: "10m"
      taskRef:
        name: git-clone
        kind: Task
      workspaces:
        - name: output
          workspace: shared-workspace
        - name: basic-auth
          workspace: git-creds
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
        - name: subdirectory
          value: source
        - name: deleteExisting
          value: "true"

    # -------------------------------------------------------------------------
    # 2. Kaniko 构建并推到 registry
    # -------------------------------------------------------------------------
    - name: build-and-push
      # Multi-stage Dockerfiles (Java/Maven, .NET SDK) on slow networks
      # easily blow past 60min during base-image pulls. 90min cap.
      timeout: "90m"
      runAfter:
        - fetch-source
      taskRef:
        name: kaniko
        kind: Task
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: source
        - name: dockerconfig
          workspace: dockerconfig
      params:
        - name: IMAGE
          value: $(params.registry-push)/$(params.repo-name):$(params.image-tag)
        - name: DOCKERFILE
          value: ./Dockerfile
        - name: CONTEXT
          value: ./
        - name: EXTRA_ARGS
          value:
            - "--skip-tls-verify"
            - "--insecure"

    # -------------------------------------------------------------------------
    # 3. Gate A — run application tests
    # -------------------------------------------------------------------------
    # No-ops cleanly when neither outpost.test.yaml nor Dockerfile.test
    # exists in the repo root (skipped, not failed). On real failure, the
    # Pipeline aborts here and update-manifest never runs — manifest repo
    # is never touched, ArgoCD sees no change, the cluster is unaffected.
    - name: run-tests
      timeout: "20m"
      runAfter:
        - build-and-push
      taskRef:
        name: outpost-run-tests
        kind: Task
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: app-name
          value: $(params.repo-name)
        - name: source-subdir
          value: source

    # -------------------------------------------------------------------------
    # 4. 拉 manifest 仓库，改 image tag，提交回去
    # -------------------------------------------------------------------------
    - name: update-manifest
      # yq edit + git commit + push — well under a minute normally.
      timeout: "5m"
      runAfter:
        - run-tests
      taskRef:
        name: update-manifest-task
      workspaces:
        - name: source
          workspace: shared-workspace
          subPath: manifest
        - name: git-creds
          workspace: git-creds
      params:
        - name: manifest-repo-url
          value: $(params.manifest-repo-url)
        - name: manifest-branch
          value: $(params.manifest-branch)
        - name: app-name
          value: $(params.repo-name)
        - name: image
          value: $(params.registry)/$(params.repo-name):$(params.image-tag)
        - name: commit-message
          value: "chore($(params.repo-name)): bump image to $(params.image-tag)"

  # ---------------------------------------------------------------------------
  # finally — runs unconditionally after all tasks complete (success or fail).
  # The notify-on-failure task uses a `when:` clause to fire ONLY when the
  # PipelineRun overall status is Failed (i.e. any task above failed).
  # ---------------------------------------------------------------------------
  finally:
    - name: notify-on-failure
      when:
        - input: "$(tasks.status)"
          operator: in
          values: ["Failed"]
      taskRef:
        name: outpost-notify
        kind: Task
      params:
        - name: payload
          value: |
            {"event":"tekton.pipelinerun.failed","level":"error","app":"$(params.repo-name)","env":"dev","commit":"$(params.image-tag)","ref":"$(params.branch)","url":"https://tekton.${ROOT_DOMAIN}/#/namespaces/tekton-pipelines/pipelineruns","text":"PipelineRun failed — see Tekton Dashboard for details"}
        - name: providers
          value: "${NOTIFICATION_PROVIDERS}"
