# ============================================================================
# 自定义 Task: 更新 manifest 仓库的 image tag
#
# 单一来源:scripts/update-manifest.sh
#   - bootstrap.sh 把脚本内容渲染成 ConfigMap (update-manifest-script)
#   - 本 Task 把 ConfigMap 挂为 /scripts,直接 exec
#   - bats 测试 (tests/bats/update-manifest.bats) 直接对脚本测试
#
# 双模式由脚本自动选择:
#   A. kustomize  — apps/<app>/kustomization.yaml 存在且含 .images key,
#                  按 name 匹配/append 更新
#   B. legacy     — 仅 apps/<app>/deployment.yaml,改 containers[0].image
# ============================================================================
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: update-manifest-task
  namespace: tekton-pipelines
spec:
  params:
    - name: manifest-repo-url
      type: string
    - name: manifest-branch
      type: string
      default: main
    - name: app-name
      type: string
    - name: image
      type: string
      description: 完整镜像引用,例:registry.example.com/scm-mcp:abc1234
    - name: commit-message
      type: string

  workspaces:
    - name: source
      description: 工作目录(供 git clone 落地)
    - name: git-creds
      description: 包含 .git-credentials(HTTPS 用户名/token)

  volumes:
    - name: update-manifest-script
      configMap:
        name: update-manifest-script
        defaultMode: 0755

  steps:
    - name: run-update-manifest
      # Direct ref, NOT daocloud-prefixed: daocloud allowlists docker.io
      # per-org (bitnami/kubectl and ghcr tektoncd-catalog both 403'd);
      # alpine/* is unverified there, while the direct ref has weeks of
      # successful pulls here. Pull-test before ever adding a prefix.
      image: alpine/git:2.43.0
      env:
        - name: MANIFEST_REPO_URL
          value: $(params.manifest-repo-url)
        - name: MANIFEST_BRANCH
          value: $(params.manifest-branch)
        - name: APP_NAME
          value: $(params.app-name)
        - name: IMAGE
          value: $(params.image)
        - name: COMMIT_MESSAGE
          value: $(params.commit-message)
        - name: WORK_DIR
          value: $(workspaces.source.path)
        - name: GIT_CRED_FILE
          value: $(workspaces.git-creds.path)/.git-credentials
      volumeMounts:
        - name: update-manifest-script
          mountPath: /scripts
          readOnly: true
      command:
        - /scripts/update-manifest.sh
