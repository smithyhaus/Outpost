# ============================================================================
# EventListener — 公网 webhook 入口
# Gitee Webhook 配置:
#   URL: https://hooks.<ROOT_DOMAIN>
#   Secret: 与 .env 中 GITEE_WEBHOOK_SECRET 一致
#   触发事件: 仅 Push
# ============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: gitee-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: gitee-push
      interceptors:
        # 1. 校验请求头是 Gitee Push Hook
        - ref:
            name: cel
          params:
            - name: filter
              value: "header.match('X-Git-Oschina-Event', 'Push Hook')"
        # 2. 校验 Webhook 签名（Gitee 把 secret 直接放在 X-Gitee-Token header）
        - ref:
            name: cel
          params:
            - name: filter
              value: "header['X-Gitee-Token'][0] == 'GITEE_WEBHOOK_SECRET_PLACEHOLDER'"
        # 3. 排除 tag push、删除分支等
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref.startsWith('refs/heads/') && body.after != '0000000000000000000000000000000000000000'"
      bindings:
        - ref: gitee-push-binding
      template:
        ref: build-template
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tekton-eventlistener
  namespace: tekton-pipelines
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`hooks.${ROOT_DOMAIN}`)
      kind: Rule
      services:
        - name: el-gitee-listener
          port: 8080
