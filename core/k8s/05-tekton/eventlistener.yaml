# ============================================================================
# EventListener — 公网 webhook 入口
#
# 当前 v0.1 实现:仅 Gitee。GIT_PROVIDER_PLUGIN=github / gitlab 的支持
# 见 plugins/git-provider/<name>/manifest.yaml,但本 EventListener
# 当前没有把 plugin 的 trigger-fragment 合并进来,详见 TODOS.md。
#
# Gitee Webhook 配置(见 docs/05-onboard-project.md):
#   URL: https://hooks.<ROOT_DOMAIN>
#   Secret: .env 中的 GIT_WEBHOOK_SECRET(自动生成)
#   触发事件: 仅 Push
# ============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: gitee-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: gitee-push
      interceptors:
        # 1. 校验请求头是 Gitee Push Hook
        - ref:
            name: cel
          params:
            - name: filter
              value: "header.match('X-Git-Oschina-Event', 'Push Hook')"
        # 2. 校验 Webhook 签名（Gitee 把 secret 直接放在 X-Gitee-Token header）
        - ref:
            name: cel
          params:
            - name: filter
              value: "header['X-Gitee-Token'][0] == '${GIT_WEBHOOK_SECRET}'"
        # 3. 排除 tag push、删除分支等
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref.startsWith('refs/heads/') && body.after != '0000000000000000000000000000000000000000'"
      bindings:
        - ref: gitee-push-binding
      template:
        ref: build-template
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tekton-eventlistener
  namespace: tekton-pipelines
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`hooks.${ROOT_DOMAIN}`)
      kind: Rule
      services:
        - name: el-gitee-listener
          port: 8080
