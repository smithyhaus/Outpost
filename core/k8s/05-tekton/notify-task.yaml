# =============================================================================
# Outpost notify-task — fan-out failure notifications.
# -----------------------------------------------------------------------------
# Reads a normalized JSON payload (see proposal §4.2) and a comma-separated
# list of providers, then for each provider:
#   1. Loads webhook URL from Secret <provider>-webhook
#   2. Loads body template from ConfigMap <provider>-template
#   3. envsubst-renders the template with NOTIFY_* env vars from the payload
#   4. POSTs to the webhook (with HMAC sig for dingtalk/feishu if sign-secret set)
#
# Used by:
#   - pipeline-build.yaml `notify-on-start` (build-started)
#   - pipeline-build.yaml `finally` task on PipelineRun failure
#   - argocd-notifications controller (via webhook services it defines itself)
#
# **HMAC signing math is mirrored from platform/lib/sign-webhook.sh** — the
# Tekton Task can't easily source that file at runtime, so the 3-line
# openssl pipeline is duplicated below. tests/bats/sign-webhook.bats has
# fixture-locked tests on the helper; if you change one, change the other.
#
# Idempotent: a delivery failure to one provider does NOT block the others.
# =============================================================================
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: outpost-notify
  namespace: tekton-pipelines
spec:
  description: Fan-out a normalized notification payload to all enabled providers.
  params:
    - name: payload
      type: string
      description: Normalized JSON payload (event/level/app/env/commit/ref/url/text).
    - name: providers
      type: string
      description: Comma-separated list of enabled providers (dingtalk,feishu,wecom,generic).
  steps:
    - name: fanout
      # alpine + apk install pulls jq/curl/gettext/openssl in ~3s every
      # PipelineRun. v0.4 will bake outpost/notify-runner:v1 with these
      # pre-installed (see TODOS). For v0.3 we cut the bigger debt —
      # 80 lines of inline bash in YAML — by ConfigMap-mounting
      # scripts/notify-fanout.sh (canonical, shellcheck-clean) and
      # platform/lib/sign-webhook.sh (signing math, single source of
      # truth) at /scripts.
      image: alpine:3.20
      env:
        - name: PAYLOAD
          value: $(params.payload)
        - name: PROVIDERS
          value: $(params.providers)
      volumeMounts:
        - { name: notify-runner-scripts, mountPath: /scripts,             readOnly: true }
        - { name: dingtalk-secret,       mountPath: /secrets/dingtalk,    readOnly: true }
        - { name: dingtalk-template,     mountPath: /templates/dingtalk,  readOnly: true }
        - { name: feishu-secret,         mountPath: /secrets/feishu,      readOnly: true }
        - { name: feishu-template,       mountPath: /templates/feishu,    readOnly: true }
        - { name: wecom-secret,          mountPath: /secrets/wecom,       readOnly: true }
        - { name: wecom-template,        mountPath: /templates/wecom,     readOnly: true }
        - { name: generic-secret,        mountPath: /secrets/generic,     readOnly: true }
        - { name: generic-template,      mountPath: /templates/generic,   readOnly: true }
      script: |
        #!/bin/sh
        set -eu
        apk add --no-cache --quiet jq curl gettext openssl coreutils >/dev/null
        exec /scripts/notify-fanout.sh
  volumes:
    # The scripts CM carries notify-fanout.sh + sign-webhook.sh.
    # Both ship with the repo (canonical sources) and are renderered into
    # the CM by bootstrap.sh — see bootstrap.d/09-test-gate.sh.
    - name: notify-runner-scripts
      configMap:
        name: notify-runner-scripts
        defaultMode: 0755
    # Each plugin volume is `optional: true` so a missing plugin doesn't
    # break the Task.
    - { name: dingtalk-secret,    secret:    { secretName: dingtalk-webhook,    optional: true } }
    - { name: dingtalk-template,  configMap: { name: dingtalk-template,         optional: true } }
    - { name: feishu-secret,      secret:    { secretName: feishu-webhook,      optional: true } }
    - { name: feishu-template,    configMap: { name: feishu-template,           optional: true } }
    - { name: wecom-secret,       secret:    { secretName: wecom-webhook,       optional: true } }
    - { name: wecom-template,     configMap: { name: wecom-template,            optional: true } }
    - { name: generic-secret,     secret:    { secretName: generic-webhook,     optional: true } }
    - { name: generic-template,   configMap: { name: generic-template,          optional: true } }
