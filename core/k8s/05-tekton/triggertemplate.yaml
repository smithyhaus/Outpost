# ============================================================================
# TriggerTemplate — 接收 binding 提取的参数，创建 PipelineRun
# ============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: build-template
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      description: Git 仓库 HTTPS URL（Gitee / GitHub / GitLab 通用）
    - name: repo-name
      description: 仓库名（用于 image tag、manifest 路径）
    - name: branch
      description: 触发的分支
    - name: revision
      description: commit SHA
    - name: short-revision
      description: 短 SHA（用作 image tag）
    - name: pusher
      description: 推送人

  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: build-$(tt.params.repo-name)-
        namespace: tekton-pipelines
      spec:
        serviceAccountName: tekton-triggers-sa
        # 默认 1h 不够 — 多 stage Dockerfile + docker.io 拉镜像在国内网络下
        # 容易碰边界。给 build-and-push 留 90min,update-manifest 5min,
        # fetch-source 10min,合计 105min 上限。
        timeouts:
          pipeline: "2h"
          tasks: "100m"
          finally: "5m"
        pipelineRef:
          name: build-and-deploy
        params:
          - name: repo-url
            value: $(tt.params.repo-url)
          - name: repo-name
            value: $(tt.params.repo-name)
          - name: branch
            value: $(tt.params.branch)
          - name: revision
            value: $(tt.params.revision)
          - name: image-tag
            value: $(tt.params.short-revision)
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 5Gi
                storageClassName: local-path
          - name: dockerconfig
            secret:
              secretName: registry-credentials
          - name: git-creds
            secret:
              secretName: git-credentials
