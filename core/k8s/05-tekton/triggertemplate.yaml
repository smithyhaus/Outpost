# ============================================================================
# TriggerTemplate — 接收 binding 提取的参数，创建 PipelineRun
# ============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: build-template
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      description: Git 仓库 HTTPS URL（Gitee / GitHub / GitLab 通用）
    - name: repo-name
      description: 仓库名（用于 image tag、manifest 路径）
    - name: branch
      description: 触发的分支
    - name: revision
      description: commit SHA
    - name: short-revision
      description: 短 SHA（用作 image tag）
    - name: pusher
      description: 推送人

  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: build-$(tt.params.repo-name)-
        namespace: tekton-pipelines
      spec:
        serviceAccountName: tekton-triggers-sa
        # 默认 1h 不够 — 多 stage Dockerfile + docker.io 拉镜像在国内网络下
        # 容易碰边界。Per-task timeouts 已写在 pipeline-build.yaml
        # (fetch-source 10m + build-and-push 90m + update-manifest 5m)。
        # 这里的 timeouts.tasks 是**所有非 finally task 的总和上限**,
        # 必须 >= 105m,留 15m 余量给 Tekton 调度延迟,故 120m。
        # pipeline 给 2h 兜底(包括 PVC 等待、scheduling、finally)。
        timeouts:
          pipeline: "2h"
          tasks: "120m"
          finally: "5m"
        pipelineRef:
          name: build-and-deploy
        params:
          - name: repo-url
            value: $(tt.params.repo-url)
          - name: repo-name
            value: $(tt.params.repo-name)
          - name: branch
            value: $(tt.params.branch)
          - name: revision
            value: $(tt.params.revision)
          - name: image-tag
            value: $(tt.params.short-revision)
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 5Gi
                storageClassName: local-path
          - name: dockerconfig
            secret:
              secretName: registry-credentials
          - name: git-creds
            secret:
              secretName: git-credentials
