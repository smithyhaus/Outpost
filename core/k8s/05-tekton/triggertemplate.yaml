# ============================================================================
# TriggerTemplate — 接收 binding 提取的参数，创建 PipelineRun
# ============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: build-template
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      description: Git 仓库 HTTPS URL（Gitee / GitHub / GitLab 通用）
    - name: repo-name
      description: 仓库名（用于 image tag、manifest 路径）
    - name: branch
      description: 触发的分支
    - name: revision
      description: commit SHA
    - name: short-revision
      description: 短 SHA（用作 image tag）
    - name: pusher
      description: 推送人

  resourcetemplates:
    - apiVersion: tekton.dev/v1beta1
      kind: PipelineRun
      metadata:
        generateName: build-$(tt.params.repo-name)-
        namespace: tekton-pipelines
      spec:
        serviceAccountName: tekton-triggers-sa
        # Tekton 硬性约束:timeouts.tasks + timeouts.finally <= timeouts.pipeline
        # Per-task timeouts 之和(pipeline-build.yaml):
        #   fetch-source 10m + build-and-push 90m + run-tests 20m + update-manifest 5m = 125m
        # finally(notify-on-failure):很短,5m 给 10m 富余
        # 留 25m 给 Tekton 调度延迟 / PVC 准备 / 慢网络重试,overall 3h 兜底。
        timeouts:
          pipeline: "3h"
          tasks: "2h30m"
          finally: "10m"
        pipelineRef:
          name: build-and-deploy
        params:
          - name: repo-url
            value: $(tt.params.repo-url)
          - name: repo-name
            value: $(tt.params.repo-name)
          - name: branch
            value: $(tt.params.branch)
          - name: revision
            value: $(tt.params.revision)
          - name: image-tag
            value: $(tt.params.short-revision)
          - name: pusher
            value: $(tt.params.pusher)
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 5Gi
                storageClassName: local-path
          - name: dockerconfig
            secret:
              secretName: registry-credentials
          - name: git-creds
            secret:
              secretName: git-credentials
