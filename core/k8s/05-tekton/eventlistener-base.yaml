# ============================================================================
# EventListener — provider-agnostic envelope.
#
# Bootstrap's Phase 8 (assemble_eventlistener) splices the active
# git-provider plugin's trigger.yaml into the splice marker below
# (it's the only literal marker line; do not duplicate it in comments).
# The plugin owns:
#   - webhook signature verification (Gitee plain-token / GitHub HMAC /
#     GitLab plain-token)
#   - header-type filter (rejects non-push events)
#   - ref filter (rejects tag pushes and branch deletions)
#   - repo whitelist filter (universal — same body across plugins)
#   - short_sha CEL overlay (universal — same body across plugins)
#   - TriggerBinding ref (provider-specific)
#   - TriggerTemplate ref (always build-template — universal)
#
# Switch providers via GIT_PROVIDER_PLUGIN in .env; bootstrap re-renders.
#
# Webhook URL is provider-agnostic: https://${HOOKS_HOST}.${ROOT_DOMAIN}
# (default HOOKS_HOST=hooks → https://hooks.<ROOT_DOMAIN>)
# Tekton service name is provider-agnostic: el-build-listener
# ============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: build-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    # OUTPOST_TRIGGERS_HERE
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tekton-eventlistener
  namespace: tekton-pipelines
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${HOOKS_HOST}.${ROOT_DOMAIN}`)
      kind: Rule
      services:
        - name: el-build-listener
          port: 8080
