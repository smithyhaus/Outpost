# ============================================================================
# EventListener — provider-agnostic envelope.
#
# Bootstrap's Phase 8 (assemble_eventlistener) splices the active
# git-provider plugin's trigger.yaml into the splice marker below
# (it's the only literal marker line; do not duplicate it in comments).
# The plugin owns:
#   - webhook signature verification (Gitee plain-token / GitHub HMAC /
#     GitLab plain-token)
#   - header-type filter (rejects non-push events)
#   - ref filter (rejects tag pushes and branch deletions)
#   - repo whitelist filter (universal — same body across plugins)
#   - short_sha CEL overlay (universal — same body across plugins)
#   - TriggerBinding ref (provider-specific)
#   - TriggerTemplate ref (always build-template — universal)
#
# Switch providers via GIT_PROVIDER_PLUGIN in .env; bootstrap re-renders.
#
# Webhook URL is provider-agnostic: https://${HOOKS_HOST}.${ROOT_DOMAIN}
# (default HOOKS_HOST=hooks → https://hooks.<ROOT_DOMAIN>)
# Tekton service name is provider-agnostic: el-build-listener
# ============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: build-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  # ---- Pod hardening (resilience layer) ----------------------------------
  # Why this block exists — the failure it prevents:
  #   Tekton Triggers' default EL pod spec ships with `resources: {}`
  #   (BestEffort QoS — first to be evicted under DiskPressure) and HTTP
  #   probes with `timeoutSeconds: 1, periodSeconds: 10, failureThreshold: 3`
  #   (= 30 s before kill). On a busy single-node k3d cluster (kaniko
  #   building, registry pulling, pruner running), the listener fails its
  #   liveness probe in waves and gets restarted. Any gitee/github push
  #   POSTed during the restart window is silently lost — bootstrap log
  #   shows the listener pod with RESTARTS=N and no PipelineRun ever
  #   created for the missed push.
  #
  # The fix — three things that together stop the eviction/kill cycle:
  #   1. requests/limits — moves the pod from BestEffort → Burstable QoS;
  #      keeps it off the eviction shortlist under DiskPressure.
  #   2. ephemeral-storage request + disk-pressure NoSchedule toleration —
  #      same pattern we ship for tekton-pruner and registry-gc.
  #   3. Probe budget — timeoutSeconds: 3 + periodSeconds: 15 +
  #      failureThreshold: 5 = ~75 s before kill, enough headroom for the
  #      listener to recover from a transient CPU spike instead of
  #      thrashing.
  #
  # Why containers[] has NO `name` field:
  #   Tekton Triggers' validation webhook explicitly REJECTS
  #   `spec.resources.kubernetesResource.spec.template.spec.containers[].name`:
  #     "must not set the field(s): ...containers[0].name"
  #   The controller fills in the name ("event-listener") itself when it
  #   merges the override into the generated Deployment. Treat this
  #   containers list as a "one anonymous patch slot" — the merge target
  #   is implicit.
  # ------------------------------------------------------------------------
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            tolerations:
              - key: node.kubernetes.io/disk-pressure
                operator: Exists
                effect: NoSchedule
            containers:
              - resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                    ephemeral-storage: 50Mi
                  limits:
                    cpu: 500m
                    memory: 256Mi
                livenessProbe:
                  httpGet:
                    path: /live
                    port: 8080
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 5
                readinessProbe:
                  httpGet:
                    path: /live
                    port: 8080
                  periodSeconds: 15
                  timeoutSeconds: 3
                  failureThreshold: 5
  triggers:
    # OUTPOST_TRIGGERS_HERE
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tekton-eventlistener
  namespace: tekton-pipelines
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${HOOKS_HOST}.${ROOT_DOMAIN}`)
      kind: Rule
      services:
        - name: el-build-listener
          port: 8080
