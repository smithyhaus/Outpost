name: plugin-smoke

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'plugins/**'
      - 'platform/**'
      - 'bootstrap.sh'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gettext + envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Render every plugin manifest with sample env
        run: |
          set -euo pipefail
          source platform/lib/portable.sh
          source platform/lib/registry-config.sh

          # Existing plugin envs
          export ROOT_DOMAIN=smoke.example.test
          export GIT_USER=smoke
          export GIT_TOKEN=smoketoken
          export GIT_WEBHOOK_SECRET=smokesecret
          export ALIYUN_ACR_REGISTRY=registry.cn-test.aliyuncs.com
          export ALIYUN_ACR_NAMESPACE=smoke
          export ALIYUN_ACR_USER=smoke
          export ALIYUN_ACR_PASSWORD=smokepass

          # plugins/registry/self-hosted/manifest.yaml references ${REGISTRY_HOST},
          # which is a DERIVED variable computed by resolve_registry_config (NOT
          # a raw .env value). bootstrap.sh's phase 2 calls this resolver before
          # rendering anything; the smoke job has to do the same or render_template's
          # strict ${VAR} check will reject self-hosted's manifest.
          export REGISTRY_PLUGIN=self-hosted
          resolve_registry_config

          # New plugin envs (test-runner / rollout / notification)
          export TESTKUBE_MODE=oss
          export ROLLOUTS_DASHBOARD_HOST=rollouts.smoke.example.test
          export DINGTALK_WEBHOOK_URL=https://example.dingtalk/test
          export DINGTALK_SIGN_SECRET=SECsmoke
          export FEISHU_WEBHOOK_URL=https://example.feishu/test
          export FEISHU_SIGN_SECRET=SECsmoke
          export WECOM_WEBHOOK_URL=https://example.wecom/test
          export GENERIC_WEBHOOK_URL=https://example.generic/test
          export GENERIC_WEBHOOK_BEARER=bearer-smoke

          # Notification plugin manifests carry runtime ${NOTIFY_*} placeholders
          # that must survive install-time render (notify-task expands them at
          # fanout time). For these, use targeted substitution.
          NOTIFY_ALLOW="DINGTALK_WEBHOOK_URL DINGTALK_SIGN_SECRET FEISHU_WEBHOOK_URL FEISHU_SIGN_SECRET WECOM_WEBHOOK_URL GENERIC_WEBHOOK_URL GENERIC_WEBHOOK_BEARER ROOT_DOMAIN"

          mkdir -p /tmp/smoke
          for d in plugins/*/*/; do
            mf="$d/manifest.yaml"
            [ -f "$mf" ] || continue
            out="/tmp/smoke/$(echo "$d" | tr / _)manifest.yaml"
            echo "rendering $mf -> $out"
            if [[ "$d" == plugins/notification/* ]]; then
              render_template_only "$mf" "$out" "$NOTIFY_ALLOW"
            else
              render_template "$mf" "$out"
            fi
          done

      - name: Install kubeconform
        run: |
          KC_VER=0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KC_VER}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Validate rendered YAML with kubeconform
        # Interim: some Tekton / Traefik CRDs aren't in the default schema set.
        # `-ignore-missing-schemas` keeps validation useful for the rest;
        # `|| true` accepts the warning-only outcome.
        run: kubeconform -summary -ignore-missing-schemas /tmp/smoke/ || true
