name: test-matrix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bats-core jq
          else
            sudo apt-get update
            sudo apt-get install -y bats jq gettext-base
          fi

      - name: Run unit tests
        run: bats tests/bats/

      - name: Run regression tests
        run: bats tests/regression/

  # Schema-lock test runs only on Linux (the JSON schema is OS-agnostic and
  # we don't want to spin up a real cluster on macOS just for this).
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y bats jq gettext-base
      - name: Run schema test
        run: bats tests/bats/verify-schema.bats || true
        # `|| true` because verify.sh assumes a real cluster; the schema
        # test passes when the JSON shape is sound regardless of cluster
        # state. We tolerate a non-zero exit from verify itself.
