# =============================================================================
# Plugin: git-provider / github
# -----------------------------------------------------------------------------
# GitHub Push event:
#   - body.ref                = "refs/heads/main"
#   - body.after              = commit SHA
#   - body.repository.clone_url
#   - body.repository.name
#   - body.pusher.name
#   - X-GitHub-Event: push
#   - X-Hub-Signature-256: sha256=<HMAC>
# Tekton's built-in `github` interceptor verifies HMAC for us.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-secret
  namespace: tekton-pipelines
type: Opaque
stringData:
  secretToken: ${GIT_WEBHOOK_SECRET}
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      value: $(body.repository.clone_url)
    - name: repo-name
      value: $(body.repository.name)
    - name: branch
      value: $(body.ref)
    - name: revision
      value: $(body.after)
    - name: short-revision
      # 7-char short SHA produced by the CEL overlay interceptor in
      # the assembled EventListener. See sibling `trigger.yaml`.
      value: $(extensions.short_sha)
    - name: pusher
      value: $(body.pusher.name)
# NOTE: the Trigger spec spliced into the EventListener lives in the
# sibling file `trigger.yaml`. bootstrap's assemble_eventlistener reads
# it directly — no ConfigMap is needed in the cluster.
