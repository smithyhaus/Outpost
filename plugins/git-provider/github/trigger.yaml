# ============================================================================
# GitHub Triggers — spliced into the EventListener envelope by Phase 8.
#
# Two triggers, distinguished by repo name:
#   1. github-push          — application repos: build image + GitOps deploy
#                             (template: build-template). EXCLUDES the library
#                             repos in OUTPOST_LIBRARY_REPOS so they don't run
#                             the image pipeline (they have no Dockerfile).
#   2. github-push-publish  — library repos (OUTPOST_LIBRARY_REPOS, default
#                             fst-foundation): pnpm -r publish @hy/* to
#                             Verdaccio (template: publish-template).
#
# Auth: Tekton's built-in `github` interceptor verifies X-Hub-Signature-256
# (HMAC-SHA256) using the github-webhook-secret Secret from this plugin's
# manifest.yaml. Each interceptor short-circuits on false; order matters.
# The library-repo set is a CEL list literal; edit inline to add more libs.
# ============================================================================
- name: github-push
  interceptors:
    - ref:
        name: github
      params:
        - name: secretRef
          value:
            secretName: github-webhook-secret
            secretKey: secretToken
        - name: eventTypes
          value: ["push"]
    - ref:
        name: cel
      params:
        - name: filter
          value: "!header.match('X-Git-Oschina-Event', 'Push Hook') && !header.match('X-Gitlab-Event', 'Push Hook')"
    - ref:
        name: cel
      params:
        - name: filter
          value: "size(${CEL_WHITELIST_LIST}) == 0 || body.repository.clone_url in ${CEL_WHITELIST_LIST}"
    - ref:
        name: cel
      params:
        - name: filter
          value: "body.ref == 'refs/heads/${OUTPOST_DEPLOY_BRANCH}' && body.after != '0000000000000000000000000000000000000000'"
    - ref:
        name: cel
      params:
        - name: filter
          value: "!(body.repository.name in ['fst-foundation'])"
    - ref:
        name: cel
      params:
        - name: overlays
          value:
            - key: short_sha
              expression: "body.after.substring(0, 7)"
  bindings:
    - ref: github-push-binding
  template:
    ref: build-template
- name: github-push-publish
  interceptors:
    - ref:
        name: github
      params:
        - name: secretRef
          value:
            secretName: github-webhook-secret
            secretKey: secretToken
        - name: eventTypes
          value: ["push"]
    - ref:
        name: cel
      params:
        - name: filter
          value: "!header.match('X-Git-Oschina-Event', 'Push Hook') && !header.match('X-Gitlab-Event', 'Push Hook')"
    - ref:
        name: cel
      params:
        - name: filter
          value: "body.ref == 'refs/heads/${OUTPOST_DEPLOY_BRANCH}' && body.after != '0000000000000000000000000000000000000000'"
    - ref:
        name: cel
      params:
        - name: filter
          value: "body.repository.name in ['fst-foundation']"
    - ref:
        name: cel
      params:
        - name: overlays
          value:
            - key: short_sha
              expression: "body.after.substring(0, 7)"
  bindings:
    - ref: github-push-binding
  template:
    ref: publish-template
