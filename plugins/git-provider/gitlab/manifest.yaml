# =============================================================================
# Plugin: git-provider / gitlab
# -----------------------------------------------------------------------------
# GitLab Push Hook event:
#   - body.ref                 = "refs/heads/main"
#   - body.after               = commit SHA
#   - body.repository.git_http_url
#   - body.repository.name
#   - body.user_username
#   - X-Gitlab-Event: Push Hook
#   - X-Gitlab-Token: <plain shared secret>
# =============================================================================
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: gitlab-push-binding
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      value: $(body.repository.git_http_url)
    - name: repo-name
      value: $(body.repository.name)
    - name: branch
      value: $(body.ref)
    - name: revision
      value: $(body.after)
    - name: short-revision
      # 7-char short SHA produced by the CEL overlay interceptor in
      # the assembled EventListener. See sibling `trigger.yaml`.
      value: $(extensions.short_sha)
    - name: pusher
      value: $(body.user_username)
# NOTE: the Trigger spec spliced into the EventListener lives in the
# sibling file `trigger.yaml`. bootstrap's assemble_eventlistener reads
# it directly — no ConfigMap is needed in the cluster.
