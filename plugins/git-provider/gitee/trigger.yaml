# ============================================================================
# Gitee Trigger — spliced into the EventListener envelope by Phase 8.
#
# Auth: plain-token compare (X-Gitee-Token header == GIT_WEBHOOK_SECRET).
# Gitee does NOT offer HMAC; this is the only signature mode.
#
# Order matters — each interceptor short-circuits on false:
#   1. Header type filter (rejects non-push events)
#   2. Token filter (rejects forged requests)
#   3. Repo whitelist (rejects out-of-scope repos; opt-in via .env)
#   4. Ref filter — deploy branch only (OUTPOST_DEPLOY_BRANCH, default main);
#      also rejects tag pushes + branch deletions
#   5. short_sha overlay (computes 7-char SHA used as image tag)
# ============================================================================
- name: gitee-push
  interceptors:
    - ref:
        name: cel
      params:
        - name: filter
          value: "header.match('X-Git-Oschina-Event', 'Push Hook')"
    # Multi-provider defense-in-depth: on a stacked EventListener, reject a
    # forged request that ALSO carries another provider's push headers, so one
    # delivery can't fire two PipelineRuns. header.match is null-safe on absent
    # headers (relied on by the self-routing design above).
    - ref:
        name: cel
      params:
        - name: filter
          value: "!header.match('X-Gitlab-Event', 'Push Hook') && !header.match('X-GitHub-Event', 'push')"
    - ref:
        name: cel
      params:
        - name: filter
          value: "header['X-Gitee-Token'][0] == '${GIT_WEBHOOK_SECRET}'"
    - ref:
        name: cel
      params:
        - name: filter
          value: "size(${CEL_WHITELIST_LIST}) == 0 || body.repository.git_http_url in ${CEL_WHITELIST_LIST}"
    - ref:
        name: cel
      params:
        - name: filter
          value: "body.ref == 'refs/heads/${OUTPOST_DEPLOY_BRANCH}' && body.after != '0000000000000000000000000000000000000000'"
    - ref:
        name: cel
      params:
        - name: overlays
          value:
            - key: short_sha
              expression: "body.after.substring(0, 7)"
  bindings:
    - ref: gitee-push-binding
  template:
    ref: build-template
