# =============================================================================
# Docker Registry v2 (self-hosted, in-cluster)
# - CI pushes images here; k3s nodes pull from here
# - No registry-side TLS (public TLS terminated at Cloudflare edge)
# - k3s containerd is configured to treat this host as an insecure mirror;
#   see bootstrap.sh
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      containers:
        - name: registry
          # m.daocloud.io/docker.io/... — index.docker.io is reset/unreachable in CN.
          image: m.daocloud.io/docker.io/registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_HTTP_ADDR
              value: ":5000"
          # Every image the cluster runs flows through this pod — without
          # probes a wedged registry looked Ready forever, and without
          # resources it ran BestEffort (first OOM-kill victim on pressure).
          readinessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  namespace: registry
spec:
  selector:
    app: docker-registry
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: docker-registry
  namespace: registry
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${REGISTRY_HOST}`)
      kind: Rule
      services:
        - name: docker-registry
          port: 5000
---
# ============================================================================
# kaniko docker config (anonymous — in-cluster registry has no auth).
# Mounted by Pipeline workspace `dockerconfig` (TriggerTemplate references
# this Secret by name `registry-credentials`).
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: tekton-pipelines
type: Opaque
stringData:
  config.json: |
    {
      "auths": {
        "registry.${ROOT_DOMAIN}": {}
      }
    }
