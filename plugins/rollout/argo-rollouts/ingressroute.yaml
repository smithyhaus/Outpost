# =============================================================================
# Argo Rollouts Dashboard — Web UI for canary progress / abort / promote.
# Exposed via Traefik. cloudflared 须在 CF Dashboard 手动加
# Public Hostname: rollouts.<root> → http://host.docker.internal:30080
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argo-rollouts-dashboard
  namespace: argo-rollouts
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${ROLLOUTS_DASHBOARD_HOST}`)
      kind: Rule
      services:
        - name: argo-rollouts-dashboard
          port: 3100
