apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-go
  namespace: apps
  labels:
    app: hello-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-go
  template:
    metadata:
      labels:
        app: hello-go
    spec:
      containers:
        - name: app
          image: registry.example.com/hello-go:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 16Mi }
            limits:   { cpu: 250m, memory: 64Mi }
