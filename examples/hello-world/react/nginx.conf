server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Plain-text health endpoint (cheap, no app code needed)
    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback — any unknown path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
