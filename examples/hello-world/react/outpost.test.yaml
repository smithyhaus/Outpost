gates:
  pre-deploy:
    timeout: 2m
  post-deploy-smoke:
    enabled: true
    image: curlimages/curl:8.10.0
    command:
      - sh
      - -c
      - "curl -fsS http://hello-world-react.apps.svc.cluster.local/"
    timeout: 30s
