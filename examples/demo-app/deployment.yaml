# =============================================================================
# Application manifest template — copy into the manifest repo as
#   apps/<app-name>/deployment.yaml
# Tekton's update-manifest task rewrites .spec.template.spec.containers[0].image
# on every successful build.
#
# **Secrets pattern (do NOT inline plaintext passwords):**
#   1. Copy `secret.example.yaml` to your manifest repo as
#        apps/<app-name>/secret.yaml
#   2. Fill in real values from INFRA.md.
#   3. `kubeseal` it locally → produces a SealedSecret YAML
#      (see `sealed-secret.example.yaml` and `examples/demo-app/README.md`).
#   4. Commit the *SealedSecret* (NOT the plaintext) to the manifest repo.
#   5. ArgoCD applies it; sealed-secrets-controller decrypts in-cluster.
#
# This Deployment uses `envFrom: secretRef:` so adding a key in the SealedSecret
# automatically appears as an env var in every Pod restart — zero deployment
# changes when secrets rotate.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: apps
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: app
          # Tekton replaces this image reference on every successful build.
          image: registry.example.com/demo-app:latest
          ports:
            - containerPort: 8080
          envFrom:
            # All app secrets come from the SealedSecret — see
            # sealed-secret.example.yaml. The decrypted Secret is named
            # `demo-app-secrets` in the apps namespace.
            - secretRef:
                name: demo-app-secrets
          env:
            # Non-secret config can stay inline. Example: service URLs that
            # only point at in-cluster bridges (no creds inside).
            - name: MEILI_URL
              value: "http://meilisearch.infra-bridges.svc.cluster.local:7700"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          # Uncomment when your app exposes /healthz:
          # readinessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: 8080
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
