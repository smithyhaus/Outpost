# =============================================================================
# Application manifest template — copy this into the manifest repo as
#   apps/<app-name>/deployment.yaml
# Tekton's update-manifest task will rewrite spec.template.spec.containers[0].image
# on every successful build.
#
# Replace every <REPLACE_*> placeholder with real values from INFRA.md.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: apps
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: app
          # Tekton replaces this image reference on every successful build.
          image: registry.example.com/demo-app:latest
          ports:
            - containerPort: 8080
          env:
            # Connection strings target the bridge services in infra-bridges.
            # Substitute <REPLACE_*> with your real password (see INFRA.md).
            - name: DATABASE_URL
              value: "postgres://postgres:<REPLACE_POSTGRES_PASSWORD>@postgres.infra-bridges.svc.cluster.local:5432/postgres"
            - name: REDIS_URL
              value: "redis://:<REPLACE_REDIS_PASSWORD>@redis.infra-bridges.svc.cluster.local:6379/0"
            - name: RABBITMQ_URL
              value: "amqp://admin:<REPLACE_RABBITMQ_PASSWORD>@rabbitmq.infra-bridges.svc.cluster.local:5672/"
            - name: MEILI_URL
              value: "http://meilisearch.infra-bridges.svc.cluster.local:7700"
            - name: MEILI_KEY
              value: "<REPLACE_MEILI_MASTER_KEY>"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          # Uncomment when your app exposes /healthz:
          # readinessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: 8080
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
