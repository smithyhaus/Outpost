# 应用域名: demo-app-apps.<ROOT_DOMAIN>
# 命名约定 `<name>-apps.<ROOT_DOMAIN>` 保持单级子域,享受 Cloudflare Universal
# SSL 免费证书覆盖(二级 `*.apps.<root>` 要付费 Advanced Certificate Manager)。
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: demo-app
  namespace: apps
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`demo-app-apps.example.com`)
      kind: Rule
      services:
        - name: demo-app
          port: 80
