# =============================================================================
# PLAINTEXT Secret template for demo-app.
#
# **DO NOT COMMIT THIS FILE WITH REAL VALUES.** This is the source for
# `kubeseal` — the encrypted output (see sealed-secret.example.yaml) is what
# goes into the manifest repo.
#
# Workflow:
#   1. Copy this file outside the manifest repo (e.g. ~/secrets/demo-app.yaml)
#   2. Replace each <REPLACE_*> with the real value from INFRA.md
#   3. Seal it:
#        kubeseal --fetch-cert > /tmp/pub.pem
#        kubeseal --cert /tmp/pub.pem -o yaml \
#          < ~/secrets/demo-app.yaml > apps/demo-app/sealed-secret.yaml
#   4. Commit ONLY apps/demo-app/sealed-secret.yaml (the encrypted version).
#   5. Delete ~/secrets/demo-app.yaml after you've verified the SealedSecret
#      decrypts in cluster (`kubectl -n apps get secret demo-app-secrets`).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: demo-app-secrets
  namespace: apps
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:<REPLACE_POSTGRES_PASSWORD>@postgres.infra-bridges.svc.cluster.local:5432/postgres"
  REDIS_URL: "redis://:<REPLACE_REDIS_PASSWORD>@redis.infra-bridges.svc.cluster.local:6379/0"
  RABBITMQ_URL: "amqp://admin:<REPLACE_RABBITMQ_PASSWORD>@rabbitmq.infra-bridges.svc.cluster.local:5672/"
  MEILI_KEY: "<REPLACE_MEILI_MASTER_KEY>"
