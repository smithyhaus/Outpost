# =============================================================================
# Example SealedSecret produced by `kubeseal` — this is the SHAPE you commit
# to the manifest repo as `apps/demo-app/sealed-secret.yaml` (replacing the
# AgB... placeholders with real kubeseal output).
#
# Generation:
#   1. Fill secret.example.yaml with real values, save outside the manifest repo.
#   2. kubeseal --fetch-cert > /tmp/pub.pem
#   3. kubeseal --cert /tmp/pub.pem -o yaml \
#        < ~/secrets/demo-app.yaml > apps/demo-app/sealed-secret.yaml
#   4. Commit apps/demo-app/sealed-secret.yaml; delete the plaintext file.
#
# In-cluster behaviour: sealed-secrets-controller watches SealedSecret CRDs,
# decrypts them with the master RSA key, and writes a regular Secret with the
# same name+namespace. The Deployment's `envFrom: { secretRef: demo-app-secrets }`
# picks it up automatically — no Deployment change needed when keys rotate.
#
# **Cluster reset survivability:** Outpost preserves the master key in
# `secrets-backup/sealed-secrets-master.key.yaml` across reset.sh + bootstrap.sh.
# Use `reset.sh --hard` if you actually want to rotate keys (every existing
# SealedSecret then has to be re-sealed against the new key).
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: demo-app-secrets
  namespace: apps
spec:
  encryptedData:
    DATABASE_URL: <KUBESEAL_OUTPUT_AgB...>
    REDIS_URL:    <KUBESEAL_OUTPUT_AgB...>
    RABBITMQ_URL: <KUBESEAL_OUTPUT_AgB...>
    MEILI_KEY:    <KUBESEAL_OUTPUT_AgB...>
  template:
    metadata:
      name: demo-app-secrets
      namespace: apps
    type: Opaque
